services:
  - type: web
    name: my-portfolio-api
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /app/storage/app/database.sqlite
      - key: MIGRATE_ON_STARTUP
        value: "true"
      - key: SEED_ON_STARTUP
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CONTACT_TO_ADDRESS
        sync: false
      - key: CONTACT_TO_NAME
        sync: false
      - key: MAIL_MAILER
        value: log
      # Avoid requiring DB-backed cache/sessions/queues (and their tables) on a
      # simple Render demo deploy.
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
