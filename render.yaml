services:
  - type: web
    name: my-portfolio-api
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: my-portfolio-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CONTACT_TO_ADDRESS
        sync: false
      - key: CONTACT_TO_NAME
        sync: false
      - key: MAIL_MAILER
        value: log

databases:
  - name: my-portfolio-db
    plan: free

